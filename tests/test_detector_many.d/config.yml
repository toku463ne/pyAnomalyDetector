---
batch_size: 100
data_sources:
  "test_detector_many":
    type: "csv"
    data_dir: "tests/testdata/csv/20250128"
    
history_interval: 600
history_retention: 12
history_recent_retention: 6
kmeans:
  k: 10
  max_iterations: 10
  n_rounds: 10
  threshold: 0.1

lambda1_threshold: 2.0 # lambda for the 1st filtering
lambda2_threshold: 2.0 # lambda for the 2nd filtering
lambda3_threshold: 3.0 # lambda for the final detection
