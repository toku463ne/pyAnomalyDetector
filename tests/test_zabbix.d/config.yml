admdb:
  host: 192.168.4.91
  user: anomdec
  password: '{{ ADM_DB_PASSWORD }}'
  dbname: anomdec
  port: 5432

logging:
  level: INFO
  log_file: /tmp/anomdec-test_zabbix.log



data_sources:
  - name: "test_zabbix"
    type: "zabbix"
    host: 192.168.32.101
    dbname: zabbix
    user: monitoring
    password: '{{ ZABBIX_DB_PASSWORD }}'
    port: 5432
    retries: 3
    item_conds: 
      - name: ignore traffic lower than 8Mbps
        item: key_ LIKE 'net.if.%.[%]' AND units = 'bps' 
        value: #'value > 8000000'
          operator: '>'
          value: 8000000
    item_diff_conds:
      - name: ignore small changes in the CPU
        item: key_ LIKE '%cpu.%' AND units = '%' 
        value: #value > 8
          operator: '>'
          value: 8
      - name: ignore small changes in the memory
        item: "key_ LIKE '%mem.%' AND units = '%'"
        value: #value > 8
          operator: '>'
          value: 8
      - name: ignore small changes in the disk
        item: "key_ LIKE '%vfs.fs.size%' AND units = '%'"
        value: #value > 3
          operator: '>'
          value: 3
      - name: ignore small changes in the disk
        item: "key_ LIKE '%vfs.fs.size%' AND units = 'B'"
        value: #value > 1000000000
          operator: '>'
          value: 1000000000
      - name: ignore small changes in the disk inode
        item: "key_ LIKE '%vfs.fs.inode%' AND units = '%'"
        value: #value > 3
          operator: '>'
          value: 3
      - name: ignore small changes in the pused
        item: "key_ LIKE '%.pused%' AND units = '%'"
        value: #value > 3
          operator: '>'
          value: 3    
      - name: ignore small changes in the web.test.time
        item: "key_ LIKE 'web.test.time[%]' AND units = 's'"
        value: #value > 1
          operator: '>'
          value: 1
      - name: ignore small changes in the network traffics
        item: "key_ LIKE 'net.if.%.[%]' AND units = 'bps'"
        value: #value > 1000000
          operator: '>'
          value: 1000000
      - name: ignore whole small percentage changes
        item: "units = '%'"
        value: #value > 3
          operator: '>'
          value: 3
      - name: ignore 5 degrees of tempuratures
        item: "units = '°C'"
        value:
          operator: '>'
          value: 5
      

view_sources:
  - name: "test_zabbix"
    dashboard_name: "anomaly_check_new"
    type: "zabbix_dashboard"
    api_url: "http://192.168.32.10/zabbix"
    user: "{{ API_USER }}"
    password: "{{ API_PASSWORD }}"
    data_source_name: "test_zabbix"

group_names:
  - hw/nw
  - hw/pc
  - app/cal
  - app/bcs
  - app/imt
  - app/sim
  - app/iim

